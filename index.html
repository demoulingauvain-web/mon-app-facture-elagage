    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .tab-active { border-bottom: 3px solid #005bbb; color: #005bbb !important; font-weight: 800; }
        .tab-admin-active { border-bottom: 3px solid #f59e0b; color: #d97706 !important; font-weight: 800; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-open { overflow: hidden; }
        
        .chip-select { transition: all 0.2s ease; border: 2px solid transparent; }
        .chip-active { background-color: #005bbb !important; color: white !important; border-color: #004a99; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .chart-container { position: relative; height: 300px; width: 100%; }

</head>
<body class="min-h-screen text-slate-900 flex flex-col relative">

    <div id="notification-area" class="fixed top-4 right-4 z-[300] space-y-3 pointer-events-none"></div>

    <div id="auth-container" class="min-h-screen flex flex-col items-center justify-center w-full z-50 absolute inset-0 bg-[#f1f5f9]">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm space-y-8 animate-in border border-slate-200 relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>
            
            <div class="text-center space-y-3 relative z-10">
                <div class="bg-[#005bbb] w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto shadow-lg mb-2">
                    <i data-lucide="lock" class="w-8 h-8"></i>
                </div>
                <h1 id="auth-title" class="text-2xl font-black tracking-tight leading-none">CONNEXION</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em] font-bold">Portail Sécurisé Firebase</p>
            </div>
            
            <div id="login-view" class="space-y-5 relative z-10">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Adresse Email</label>
                    <input type="email" id="login-email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-[#005bbb] outline-none transition-all" placeholder="pro@exemple.fr">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Mot de passe</label>
                    <input type="password" id="login-password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-[#005bbb] outline-none transition-all" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full py-3.5 bg-[#005bbb] text-white rounded-xl text-[10px] font-black uppercase hover:bg-blue-700 shadow-lg transition-all flex items-center justify-center gap-2 mt-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Se connecter
                </button>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink-0 mx-4 text-[9px] text-slate-400 uppercase font-black">OU</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
                <button onclick="toggleAuthMode(true)" class="w-full py-3.5 bg-white text-slate-600 border-2 border-slate-100 rounded-xl text-[10px] font-black uppercase hover:border-[#005bbb] hover:text-[#005bbb] transition-all flex items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Créer un compte
                </button>
            </div>

            <div id="register-view" class="hidden space-y-4 relative z-10">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-widest">Type de compte</label>
                    <select id="reg-role" onchange="document.getElementById('reg-company-container').classList.toggle('hidden', this.value !== 'prestataire')" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-[#005bbb] outline-none">
                        <option value="enedis">Je suis Enedis</option>
                        <option value="prestataire">Je suis un Prestataire</option>
                    </select>
                </div>
                <div id="reg-company-container" class="hidden">
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-widest">Nom de l'entreprise</label>
                    <input type="text" id="reg-company" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold uppercase focus:ring-2 focus:ring-[#005bbb] outline-none" placeholder="Ex: SANGUINET">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-widest">Email</label>
                    <input type="email" id="reg-email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-[#005bbb] outline-none" placeholder="pro@exemple.fr">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-widest">Mot de passe (Min 6 car.)</label>
                    <input type="password" id="reg-password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-[#005bbb] outline-none" placeholder="••••••••">
                </div>
                <button onclick="handleRegister()" class="w-full py-3.5 bg-[#005bbb] text-white rounded-xl text-[10px] font-black uppercase hover:bg-blue-700 shadow-lg transition-all flex items-center justify-center gap-2 mt-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> Valider l'inscription
                </button>
                <button onclick="toggleAuthMode(false)" class="w-full py-3 bg-white text-slate-500 text-[10px] font-black uppercase hover:text-[#005bbb] transition-all text-center">
                    Retour à la connexion
                </button>
            </div>
        </div>
        <p class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-300 mt-8">Facturation Élagage v4.7 Pro</p>
    </div>

    <div id="app-container" class="hidden flex-col w-full flex-grow">
        </div>

    <script>
        // =====================================================================
        // 2. CONFIGURATION ET INITIALISATION FIREBASE
        // =====================================================================
        /// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyC7R5SAtvyi93qA4WBlhc5kPg2_g6p5iHg",
  authDomain: "facturation-elagage-enedis.firebaseapp.com",
  databaseURL: "https://facturation-elagage-enedis-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "facturation-elagage-enedis",
  storageBucket: "facturation-elagage-enedis.firebasestorage.app",
  messagingSenderId: "907707945669",
  appId: "1:907707945669:web:fd274265eb1c21c3a3d6ac",
  measurementId: "G-9JKC55MS5W"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        // =====================================================================


        const { jsPDF } = window.jspdf;
        let currentMode = 'HTA';
        let rawData = [];
        let results = { elHT: 0, elST: 0, elNuHT: 0, elNuST: 0, elTorHT: 0, elTorST: 0, dbli: 0, abat: 0, dates: [], codes: {}, ouvrages: new Set() };
        let dateRange = { start: null, end: null };
        let alerts = [];
        let sourceFileName = "Facture";
        let lastCalculationTotals = { ht: 0, ttc: 0, km: 0, dbliKm: 0, abatCount: 0 };
        
        let rootHandle = null; 
        let baseAppHandle = null; 
        let charts = { revenue: null, volumes: null };

        const MOIS_LETTRES = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

        const initialDB = {
            vendors: {
                "SANGUINET": { contracts: { "EFP2306240": { mode: "HTA", prices: { elHT:1.2, elST:1.8, dbli:0.8, abat:45, tva:20 }, desc: "ÉLAGAGE RÉSEAU HTA - LOT SANGUINET" } } },
                "TURSAN": { contracts: { "EEP2305840": { mode: "HTA", prices: { elHT:1.2, elST:1.8, dbli:0.8, abat:45, tva:20 }, desc: "ÉLAGAGE RÉSEAU HTA - LOT TURSAN" } } }
            },
            history: []
        };

        let db = JSON.parse(localStorage.getItem('enedis_elagage_db_v47')) || initialDB;
        const CODE_UNIQUE_REGEX = /\b\d{5}[A-Z]\d{4}\b/;

        /* ----------------------------------------------------
         * SYSTÈME D'AUTHENTIFICATION FIREBASE
         * ---------------------------------------------------- */
        
        // Listener global Firebase : Détecte automatiquement si l'utilisateur est connecté ou non
        auth.onAuthStateChanged((user) => {
            if (user) {
                // L'utilisateur est connecté !
                // On récupère son rôle stocké localement (Temporaire avant de passer à Firestore)
                let usersMeta = JSON.parse(localStorage.getItem('enedis_elagage_roles')) || {};
                let userMeta = usersMeta[user.email] || { role: 'prestataire', company: 'INCONNU' };
                
                // On configure la session pour le reste de l'application
                sessionStorage.setItem('enedis_elagage_auth', 'true');
                sessionStorage.setItem('enedis_elagage_role', userMeta.role);
                if (userMeta.company) sessionStorage.setItem('enedis_elagage_company', userMeta.company);
                
                unlockApp();
            } else {
                // L'utilisateur est déconnecté
                sessionStorage.clear();
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('flex');
            }
        });

        function toggleAuthMode(isRegister) {
            document.getElementById('login-view').classList.toggle('hidden', isRegister);
            document.getElementById('register-view').classList.toggle('hidden', !isRegister);
            document.getElementById('auth-title').textContent = isRegister ? "INSCRIPTION" : "CONNEXION";
        }

        // --- NOUVELLE FONCTION D'INSCRIPTION FIREBASE ---
        async function handleRegister() {
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value.trim();
            const role = document.getElementById('reg-role').value;
            const company = document.getElementById('reg-company').value.trim().toUpperCase();

            if (!email || !pass) return notify("Veuillez remplir tous les champs", "error");
            if (pass.length < 6) return notify("Le mot de passe doit faire 6 caractères minimum", "error");
            if (role === 'prestataire' && !company) return notify("Veuillez indiquer le nom de l'entreprise", "error");

            try {
                // 1. Création du compte sécurisé chez Firebase
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                
                // 2. Sauvegarde du rôle localement (A migrer vers Firebase Firestore plus tard)
                let usersMeta = JSON.parse(localStorage.getItem('enedis_elagage_roles')) || {};
                usersMeta[email] = { role: role, company: role === 'prestataire' ? company : null };
                localStorage.setItem('enedis_elagage_roles', JSON.stringify(usersMeta));

                notify("Compte créé avec succès !");
                
                // Astuce : Firebase connecte automatiquement l'utilisateur après inscription.
                // Le onAuthStateChanged prendra le relais instantanément.
            } catch (error) {
                // Gestion des erreurs Firebase (ex: email déjà utilisé)
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') msg = "Cet email est déjà utilisé.";
                notify(msg, "error");
            }
        }

        // --- NOUVELLE FONCTION DE CONNEXION FIREBASE ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!email || !pass) return notify("Veuillez remplir tous les champs", "error");

            try {
                // Firebase vérifie les identifiants sur ses serveurs
                await auth.signInWithEmailAndPassword(email, pass);
                notify("Connexion en cours...");
                // Note: Pas besoin d'appeler unlockApp() ici, le onAuthStateChanged s'en charge.
            } catch (error) {
                notify("Identifiants incorrects", "error");
            }
        }

        function unlockApp() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('flex');
            
            const role = sessionStorage.getItem('enedis_elagage_role');
            if (role === 'admin') {
                document.getElementById('tab-admin').classList.remove('hidden');
            } else {
                document.getElementById('tab-admin').classList.add('hidden');
                if(!document.getElementById('section-admin').classList.contains('hidden')) {
                    switchTab('process');
                }
            }

            lucide.createIcons();
            initVendorList();
            updateUIState();
            setupEventListeners();
            initHistoryFilters();
            checkAndInitDirectory();
        }

        // --- NOUVELLE FONCTION DE DÉCONNEXION FIREBASE ---
        function logout() {
            auth.signOut().then(() => {
                notify("Déconnexion réussie");
                document.getElementById('login-password').value = '';
            }).catch((error) => {
                notify("Erreur lors de la déconnexion", "error");
            });
        }

        // (Note: La fonction renderAdminUsers() de l'onglet Admin perdra un peu de son sens 
        // car elle ne peut pas afficher les mots de passe Firebase, qui sont cryptés et inaccessibles. 
        // Il est normal qu'elle ne montre plus les mots de passe de tous les utilisateurs).

        /* ----------------------------------------------------
         * INITIALISATION
         * ---------------------------------------------------- */
        window.onload = async () => {
            lucide.createIcons();
            // L'appel à checkAuthStatus() n'est plus nécessaire ici
            // car auth.onAuthStateChanged s'exécute automatiquement au chargement !
        };

        // ... L'INTÉGRALITÉ DU RESTE DE VOTRE CODE JAVASCRIPT RESTE IDENTIQUE ...
        // (Copiez-collez ici les fonctions checkAndInitDirectory, getDBHandle, switchTab, calculate, exportToPDF, etc.)
